name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pivot_user
          POSTGRES_PASSWORD: pivot_pass
          POSTGRES_DB: pivotradar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pivot_user:pivot_pass@localhost:5432/pivotradar
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: test
      REDIS_URL: redis://localhost:6379/0
      # Sentry, SMTP ve harici servisler CI'da devre dışı
      SENTRY_DSN: ""
      SMTP_HOST: ""
      TURNSTILE_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/app --select=E,F,W --ignore=E501,W503 || true

      - name: Type check (pyright — non-blocking)
        run: |
          pip install pyright
          pyright backend/app --outputjson 2>/dev/null | python -c "
          import json, sys
          data = json.load(sys.stdin)
          errors = [d for d in data.get('generalDiagnostics', []) if d['severity'] == 'error']
          print(f'Pyright: {len(errors)} errors (non-blocking)')
          " || true

      - name: Run unit tests
        run: |
          pytest backend/tests/unit \
            -v \
            --tb=short \
            --timeout=30 \
            -m "not slow" \
            --cov=backend/app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Run integration tests (scanner pipeline)
        run: |
          pytest backend/tests/integration/test_scanner_pipeline.py \
            backend/tests/integration/test_admin_api.py \
            backend/tests/integration/test_auth_api.py \
            -v \
            --tb=short \
            --timeout=60

      - name: Run security tests
        run: |
          pytest backend/tests/security \
            -v \
            --tb=short \
            --timeout=30

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Kritik kontrol: scanner ve scheduler testleri ayrı job — başarısız olursa bloke et
  scanner-critical:
    name: Scanner Critical Tests
    runs-on: ubuntu-latest
    needs: []  # test job'dan bağımsız çalış

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pivot_user
          POSTGRES_PASSWORD: pivot_pass
          POSTGRES_DB: pivotradar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pivot_user:pivot_pass@localhost:5432/pivotradar
      SECRET_KEY: ci-test-secret-key
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r backend/requirements.txt

      - name: DB lock concurrency test
        run: |
          pytest backend/tests/integration/test_scanner_pipeline.py::TestDBScanLock \
            -v --tb=long --timeout=30

      - name: Cache invalidation test
        run: |
          pytest backend/tests/integration/test_scanner_pipeline.py::TestAnalyzeCache \
            backend/tests/integration/test_scanner_pipeline.py::TestAutoScanDecisionLogic \
            -v --tb=long --timeout=30

      - name: Scheduler dedup test
        run: |
          pytest backend/tests/unit/test_scheduler_dedup.py \
            -v --tb=long --timeout=30

      - name: Auto-scan decision matrix
        run: |
          pytest backend/tests/unit/test_auto_scan_logic.py \
            -v --tb=long --timeout=30
