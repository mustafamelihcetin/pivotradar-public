[pytest]
# PivotRadar — unified pytest configuration
testpaths =
    backend/tests

# ── Markers ──────────────────────────────────────────────────────────────────
markers =
    unit:         Unit tests (no external I/O)
    integration:  Integration tests (real DB / HTTP via TestClient)
    api:          API contract tests
    performance:  Performance / throughput benchmarks (requires pytest-benchmark)
    security:     Security / authorization tests
    e2e:          End-to-end tests (Playwright — run separately via npm run test:e2e)
    slow:         Tests expected to take > 2s

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -ra
    -q
    --tb=short
    --strict-markers
    --import-mode=importlib

# ── Coverage (activate with: pytest --cov=backend/app) ───────────────────────
# requires: pip install pytest-cov
# Run with: pytest --cov=backend/app --cov-fail-under=70
# To enforce in CI add these to addopts when coverage is wired up:
#   --cov=backend/app
#   --cov-fail-under=70

# ── Timeout (activate with: pip install pytest-timeout) ──────────────────────
# timeout = 30
